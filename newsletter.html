<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INTERIØR — Newsletter</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'DGMSaffron-Mono-Regular';
            src: url('FONTS/DGMSaffron-Mono-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        body {
            background: #000;
            color: #b9b9b9;
            font-family: 'DGMSaffron-Mono-Regular', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 24px;
            opacity: 0;
            animation: fadeIn 0.6s ease-in forwards;
        }

        .back-arrow {
            position: fixed;
            top: 30px;
            left: 20px;
            font-family: Arial, sans-serif;
            font-size: 22px;
            color: #6a6a6a;
            text-decoration: none;
            z-index: 100;
        }
        .back-arrow:hover { color: #ffffff; }

        .wrap {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 16px;
            font-weight: normal;
            letter-spacing: 0.08em;
            color: #b9b9b9;
            margin-bottom: 28px;
        }
        .lede {
            font-size: 13px;
            color: #7a7a7a;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        /* Substack embed wrapper — the iframe comes from their CDN */
        .embed-wrap {
            background: #ffffff;
            padding: 0;
        }
        iframe.substack {
            width: 100%;
            height: 320px;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-arrow">&#8592;</a>

    <div class="wrap">
        <h1>NEWSLETTER</h1>
        <p class="lede">
            Occasional dispatches. Notes on forthcoming releases, mixtapes,
            essays, and adjacent transmissions.
        </p>

        <div class="embed-wrap">
            <iframe
                class="substack"
                src="https://interiorlabel.substack.com/embed"
                frameborder="0"
                scrolling="no"></iframe>
        </div>
    </div>
</body>
</html>
