<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>INTERIØR — int291 · Channel Zero</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        @font-face {
            font-family: 'DGMSaffron-Mono-Regular';
            src: url('FONTS/DGMSaffron-Mono-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'DGMSaffron-Mono-Regular', sans-serif;
            color: #7a7a7a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        a {
            color: #7a7a7a;
            text-decoration: none;
        }

        a:hover { color: #e0e0e0; }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 28px 28px;
        }

        .back-arrow {
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #6a6a6a;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            padding: 100px 32px 60px;
        }

        .release-label {
            font-size: 10px;
            color: #555;
            margin-bottom: 6px;
            letter-spacing: 0.08em;
        }

        .release-title {
            font-size: 20px;
            color: #a0a0a0;
            margin-bottom: 52px;
            letter-spacing: 0.08em;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 52px;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-top: 1px solid #1a1a1a;
            cursor: pointer;
            color: #8a8a8a;
            transition: color 0.2s;
        }

        .track-item:last-child {
            border-bottom: 1px solid #1a1a1a;
        }

        .track-item:hover {
            color: #ffffff;
        }

        .track-item.unreleased {
            cursor: default;
            color: #3a3a3a;
        }

        .track-item.unreleased:hover {
            color: #3a3a3a;
        }

        .track-item.unreleased .track-number {
            color: #2e2e2e;
        }

        .track-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .track-number {
            font-size: 11px;
            color: #555;
        }

        .track-name {
            font-size: 14px;
            letter-spacing: 0.04em;
        }

        .play-icon-wrap {
            position: relative;
            width: 10px;
            height: 12px;
            flex-shrink: 0;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 6px 0 6px 10px;
            border-color: transparent transparent transparent #8a8a8a;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.2s;
        }

        .pause-wrap {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .pause-bar {
            width: 3px;
            height: 12px;
            background: #8a8a8a;
        }

        .track-item.playing .play-icon { opacity: 0; }
        .track-item.playing .pause-wrap { opacity: 1; }

        .progress-bar-wrap {
            width: 100%;
            height: 1px;
            background: #1a1a1a;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }

        .progress-bar-wrap.visible {
            max-height: 1px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #9a9a9a;
            transition: width 0.4s linear;
        }

        .description {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }

    </style>
</head>
<body>

<nav class="nav">
    <a href="releases.html" class="back-arrow">&#8592;</a>
</nav>

<div class="container">

    <div class="release-label">PROTOCOL</div>
    <div class="release-title">CHANNEL ZERO</div>

    <div class="track-list">

        <div class="track-item" onclick="playAudio('lost-signal-noise.mp3', this)" data-index="0">
            <div class="track-left">
                <span class="track-number">01</span>
                <span class="track-name">LOST SIGNAL (NOISE)</span>
            </div>
            <div class="play-icon-wrap">
                <div class="play-icon"></div>
                <div class="pause-wrap">
                    <div class="pause-bar"></div>
                    <div class="pause-bar"></div>
                </div>
            </div>
        </div>
        <div class="progress-bar-wrap" id="progress-0"><div class="progress-bar-fill" id="fill-0"></div></div>

        <div class="track-item unreleased">
            <div class="track-left">
                <span class="track-number">02</span>
                <span class="track-name">BLIND BELIEF</span>
            </div>
        </div>

        <div class="track-item unreleased">
            <div class="track-left">
                <span class="track-number">03</span>
                <span class="track-name">ELECTROMAGNETIC SHADOW</span>
            </div>
        </div>

        <div class="track-item unreleased">
            <div class="track-left">
                <span class="track-number">04</span>
                <span class="track-name">BLACK SNOW CULT</span>
            </div>
        </div>

    </div>

    <div class="description">
        Live hardware recordings · London · 2026<br>
        Mastered by Manmade Mastering, Berlin<br>
        Limited to 150 copies on vinyl
    </div>

</div>

<script>
const audio = new Audio();
let playing = false;
let progressInterval;

function playAudio(track, element) {
    if (!playing) {
        audio.src = track;
        audio.currentTime = 0;
        audio.play();

        element.classList.add('playing');
        document.getElementById('progress-0').classList.add('visible');

        progressInterval = setInterval(() => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill-0').style.width = pct + '%';
        }, 400);

        playing = true;

    } else {
        audio.pause();
        element.classList.remove('playing');
        document.getElementById('progress-0').classList.remove('visible');
        clearInterval(progressInterval);
        playing = false;
    }

    audio.onended = () => {
        element.classList.remove('playing');
        document.getElementById('progress-0').classList.remove('visible');
        document.getElementById('fill-0').style.width = '0%';
        clearInterval(progressInterval);
        playing = false;
    };
}
</script>

</body>
</html>
