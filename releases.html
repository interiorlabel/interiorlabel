<!DOCTYPE html>
<html>
<head>
    <title>Protocol - Works</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: Baskerville, "Times New Roman", serif;
            color: #5a5a5a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
            letter-spacing: 0.03em;
        }

        a {
            color: #5a5a5a;
            text-decoration: none;
            transition: color 0.25s ease;
        }

        a:hover { color: #d0d0d0; }

        /* Nav */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 28px;
            z-index: 100;
        }

        .back-arrow {
            font-size: 18px;
            color: #4a4a4a;
        }

        .bandcamp-link {
            font-size: 11px;
            letter-spacing: 0.08em;
            color: #4a4a4a;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 1px;
        }

        /* Container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            padding: 100px 32px 60px;
        }

        /* Label + release info */
        .release-label {
            font-size: 10px;
            color: #333;
            margin-bottom: 6px;
        }

        .release-title {
            font-size: 13px;
            color: #6a6a6a;
            margin-bottom: 52px;
            letter-spacing: 0.04em;
        }

        /* Divider */
        .divider {
            width: 1px;
            height: 28px;
            background: #1e1e1e;
            margin-bottom: 52px;
        }

        /* Track list */
        .track-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 52px;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-top: 1px solid #111;
            cursor: pointer;
            color: #5a5a5a;
        }

        .track-item:last-child {
            border-bottom: 1px solid #111;
        }

        .track-item:hover {
            color: #c8c8c8;
        }

        .track-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .track-number {
            font-size: 10px;
            color: #2e2e2e;
            min-width: 18px;
            text-align: right;
        }

        .track-name {
            font-size: 13px;
        }

        /* Play / pause icon */
        .play-icon-wrap {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 5px 0 5px 9px;
            border-color: transparent transparent transparent #3e3e3e;
        }

        .pause-wrap {
            display: none;
            align-items: center;
            gap: 3px;
        }

        .pause-bar {
            width: 3px;
            height: 11px;
            background: #3e3e3e;
        }

        .track-item.playing .play-icon { display: none; }
        .track-item.playing .pause-wrap { display: flex; }

        /* Progress bar */
        .progress-bar-wrap {
            width: 100%;
            height: 1px;
            background: #111;
            display: none;
        }

        .progress-bar-wrap.visible {
            display: block;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #3a3a3a;
        }

        /* Description */
        .description {
            font-size: 11px;
            color: #333;
            line-height: 1.8;
            letter-spacing: 0.04em;
        }

    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="back-arrow">←</a>
        <a href="https://interiorr.bandcamp.com/" class="bandcamp-link" target="_blank">Bandcamp</a>
    </nav>

    <div class="container">

        <div class="release-label">Protocol</div>
        <div class="release-title">Interiør</div>

        <div class="track-list" id="trackList">

            <div class="track-item" onclick="playAudio('audio/Untitled291.mp3', this)" data-index="0">
                <div class="track-left">
                    <span class="track-number">01</span>
                    <span class="track-name">Untitled 291</span>
                </div>
                <div class="play-icon-wrap">
                    <div class="play-icon"></div>
                    <div class="pause-wrap">
                        <div class="pause-bar"></div>
                        <div class="pause-bar"></div>
                    </div>
                </div>
            </div>
            <div class="progress-bar-wrap" id="progress-0"><div class="progress-bar-fill" id="fill-0"></div></div>

            <div class="track-item" onclick="playAudio('audio/Untitled292.mp3', this)" data-index="1">
                <div class="track-left">
                    <span class="track-number">02</span>
                    <span class="track-name">Untitled 292</span>
                </div>
                <div class="play-icon-wrap">
                    <div class="play-icon"></div>
                    <div class="pause-wrap">
                        <div class="pause-bar"></div>
                        <div class="pause-bar"></div>
                    </div>
                </div>
            </div>
            <div class="progress-bar-wrap" id="progress-1"><div class="progress-bar-fill" id="fill-1"></div></div>

            <div class="track-item" onclick="playAudio('audio/Untitled293.mp3', this)" data-index="2">
                <div class="track-left">
                    <span class="track-number">03</span>
                    <span class="track-name">Untitled 293</span>
                </div>
                <div class="play-icon-wrap">
                    <div class="play-icon"></div>
                    <div class="pause-wrap">
                        <div class="pause-bar"></div>
                        <div class="pause-bar"></div>
                    </div>
                </div>
            </div>
            <div class="progress-bar-wrap" id="progress-2"><div class="progress-bar-fill" id="fill-2"></div></div>

            <div class="track-item" onclick="playAudio('audio/Untitled294.mp3', this)" data-index="3">
                <div class="track-left">
                    <span class="track-number">04</span>
                    <span class="track-name">Untitled 294</span>
                </div>
                <div class="play-icon-wrap">
                    <div class="play-icon"></div>
                    <div class="pause-wrap">
                        <div class="pause-bar"></div>
                        <div class="pause-bar"></div>
                    </div>
                </div>
            </div>
            <div class="progress-bar-wrap" id="progress-3"><div class="progress-bar-fill" id="fill-3"></div></div>

        </div>

        <div class="description">
            Live hardware recordings · London<br>
            150 copies on vinyl · March 2026<br>
            Felipe Pinto
        </div>

    </div>

    <script>
        const audioPlayers = {};
        const trackFiles = [
            'audio/Untitled291.mp3',
            'audio/Untitled292.mp3',
            'audio/Untitled293.mp3',
            'audio/Untitled294.mp3'
        ];

        trackFiles.forEach((track, i) => {
            const audio = new Audio(track);
            audio.preload = "auto";
            audioPlayers[track] = { audio, index: i };
        });

        let currentTrack = null;
        let progressInterval = null;

        function clearAll() {
            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
            document.querySelectorAll('.progress-bar-wrap').forEach(el => el.classList.remove('visible'));
            document.querySelectorAll('.progress-bar-fill').forEach(el => el.style.width = '0%');
            if (progressInterval) clearInterval(progressInterval);
        }

        function updateProgress(audio, index) {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (!audio.duration) return;
                const pct = (audio.currentTime / audio.duration) * 100;
                const fill = document.getElementById('fill-' + index);
                if (fill) fill.style.width = pct + '%';
            }, 500);
        }

        function playAudio(track, element) {
            const { audio, index } = audioPlayers[track];

            if (currentTrack && currentTrack !== audio) {
                currentTrack.pause();
                clearAll();
            }

            if (audio.paused) {
                audio.play();
                element.classList.add('playing');
                document.getElementById('progress-' + index).classList.add('visible');
                updateProgress(audio, index);
                currentTrack = audio;
            } else {
                audio.pause();
                element.classList.remove('playing');
                document.getElementById('progress-' + index).classList.remove('visible');
                if (progressInterval) clearInterval(progressInterval);
                currentTrack = null;
            }

            audio.onended = () => {
                clearAll();
                currentTrack = null;
            };
        }
    </script>

</body>
</html>
