<!DOCTYPE html>
<html>
<head>
    <title>Protocol - Works</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: Baskerville, "Times New Roman", serif;
            color: #7a7a7a; /* lighter */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        a {
            color: #7a7a7a;
            text-decoration: none;
        }

        a:hover { color: #e0e0e0; }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 28px 28px;
        }

        .back-arrow {
            font-size: 18px;
            color: #6a6a6a;
        }

        .bandcamp-link {
            font-size: 12px;
            color: #6a6a6a;
            border-bottom: 1px solid #3a3a3a;
            font-family: "EK Grotesk", sans-serif;
            text-transform: uppercase;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            padding: 100px 32px 60px;
        }

        .release-label {
            font-size: 10px;
            color: #555;
            margin-bottom: 6px;
        }

        .release-title {
            font-size: 20px;
            color: #a0a0a0;
            margin-bottom: 52px;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 52px;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-top: 1px solid #1a1a1a;
            cursor: pointer;
            color: #8a8a8a;
        }

        .track-item:last-child {
            border-bottom: 1px solid #1a1a1a;
        }

        .track-item:hover {
            color: #ffffff;
        }

        .track-number {
            font-size: 11px;
            color: #555;
        }

        .play-icon {
            border-color: transparent transparent transparent #8a8a8a;
        }

        .pause-bar {
            background: #8a8a8a;
        }

        .progress-bar-fill {
            background: #9a9a9a;
        }

        .description {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
        }

    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="back-arrow">←</a>
    <a href="https://interiorr.bandcamp.com/" class="bandcamp-link" target="_blank">Bandcamp</a>
</nav>

<div class="container">

    <div class="release-label">Protocol</div>
    <div class="release-title">Interiør</div>

    <div class="track-list">

        <div class="track-item" onclick="playAudio('audio/Lost Signal (noise).mp3', this)" data-index="0">
            <div class="track-left">
                <span class="track-number">01</span>
                <span class="track-name">Lost Signal (Noise)</span>
            </div>
            <div class="play-icon-wrap">
                <div class="play-icon"></div>
                <div class="pause-wrap">
                    <div class="pause-bar"></div>
                    <div class="pause-bar"></div>
                </div>
            </div>
        </div>
        <div class="progress-bar-wrap" id="progress-0"><div class="progress-bar-fill" id="fill-0"></div></div>

        <div class="track-item disabled">
            <div class="track-left">
                <span class="track-number">02</span>
                <span class="track-name">Blind Belief</span>
            </div>
        </div>

        <div class="track-item disabled">
            <div class="track-left">
                <span class="track-number">03</span>
                <span class="track-name">Electromagnetic Shadow</span>
            </div>
        </div>

        <div class="track-item disabled">
            <div class="track-left">
                <span class="track-number">04</span>
                <span class="track-name">Black Snow Cult</span>
            </div>
        </div>

    </div>

    <div class="description">
        Live hardware recordings · London · 2026<br>
        Mastered by Manmade Mastering, Berlin<br>
        Limited to 150 copies on vinyl
    </div>

</div>

<script>
const audio = new Audio();
let playing = false;
let progressInterval;

function playAudio(track, element) {

    const encoded = encodeURI(track);

    if (!playing) {
        audio.src = encoded;
        audio.currentTime = 0;
        audio.play();

        element.classList.add('playing');
        document.getElementById('progress-0').classList.add('visible');

        progressInterval = setInterval(() => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill-0').style.width = pct + '%';
        }, 400);

        playing = true;

    } else {
        audio.pause();
        element.classList.remove('playing');
        document.getElementById('progress-0').classList.remove('visible');
        clearInterval(progressInterval);
        playing = false;
    }

    audio.onended = () => {
        element.classList.remove('playing');
        document.getElementById('progress-0').classList.remove('visible');
        document.getElementById('fill-0').style.width = '0%';
        clearInterval(progressInterval);
        playing = false;
    };
}
</script>

</body>
</html>
