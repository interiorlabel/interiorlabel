<!DOCTYPE html>
<html>
<head>
    <title>Protocol - Works</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: Baskerville, "Times New Roman", serif;
            color: #8a8a8a; /* lighter */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        a {
            color: #8a8a8a;
            text-decoration: none;
        }

        a:hover { color: #e0e0e0; }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 28px 28px;
        }

        .back-arrow {
            font-size: 18px;
            color: #7a7a7a;
        }

        .bandcamp-link {
            font-size: 12px;
            color: #7a7a7a;
            border-bottom: 1px solid #3a3a3a;
            font-family: "EK Grotesk", sans-serif;
            text-transform: uppercase;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            padding: 100px 32px 60px;
        }

        .release-label {
            font-size: 10px;
            color: #555;
            margin-bottom: 6px;
        }

        .release-title {
            font-size: 20px;
            color: #b0b0b0;
            margin-bottom: 52px;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 52px;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-top: 1px solid #1a1a1a;
            cursor: pointer;
            color: #9a9a9a;
        }

        .track-item:last-child {
            border-bottom: 1px solid #1a1a1a;
        }

        .track-item:hover {
            color: #ffffff;
        }

        .track-item.disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        .track-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .track-number {
            font-size: 11px;
            color: #555;
        }

        .track-name {
            font-size: 15px;
        }

        .play-icon {
            border-color: transparent transparent transparent #8a8a8a;
        }

        .pause-bar {
            background: #8a8a8a;
        }

        .progress-bar-wrap {
            background: #1a1a1a;
        }

        .progress-bar-fill {
            background: #888;
        }

        .description {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
        }

    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="back-arrow">←</a>
    <a href="https://interiorr.bandcamp.com/" class="bandcamp-link" target="_blank">Bandcamp</a>
</nav>

<div class="container">

    <div class="release-label">Protocol</div>
    <div class="release-title">Channel Zero</div>

    <div class="track-list">

        <div class="track-item" onclick="playAudio('audio/Lost Signal (noise).mp3', this)">
            <div class="track-left">
                <span class="track-number">01</span>
                <span class="track-name">Lost Signal (Noise)</span>
            </div>
            <div class="play-icon-wrap">
                <div class="play-icon"></div>
                <div class="pause-wrap">
                    <div class="pause-bar"></div>
                    <div class="pause-bar"></div>
                </div>
            </div>
        </div>

        <div class="progress-bar-wrap" id="progress-0">
            <div class="progress-bar-fill" id="fill-0"></div>
        </div>

    </div>

    <div class="description">
        Live hardware recordings · London · 2026<br>
        Mastered by Manmade Mastering, Berlin<br>
        Limited to 150 copies on vinyl
    </div>

</div>

<script>
let audio = new Audio();
let playing = false;
let progressInterval;

function playAudio(track, element) {

    const encodedPath = encodeURI(track);

    if (!playing) {
        audio.src = encodedPath;
        audio.currentTime = 0;

        audio.play();

        element.classList.add('playing');
        document.getElementById('progress-0').classList.add('visible');

        progressInterval = setInterval(() => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill-0').style.width = pct + '%';
        }, 300);

        playing = true;

    } else {
        audio.pause();
        element.classList.remove('playing');
        document.getElementById('progress-0').classList.remove('visible');
        clearInterval(progressInterval);
        playing = false;
    }

    audio.onended = () => {
        element.classList.remove('playing');
        document.getElementById('progress-0').classList.remove('visible');
        document.getElementById('fill-0').style.width = '0%';
        clearInterval(progressInterval);
        playing = false;
    };
}
</script>

</body>
</html>
