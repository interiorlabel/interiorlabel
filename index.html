<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERIØR</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <style>
    @font-face {
        font-family: 'ES Allianz TRIAL';
        src: url('ESAllianzTRIAL-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    body {
        margin: 0;
        padding: 0;
        background-color: black;
        font-family: 'ES Allianz TRIAL';
        color: #b9b9b9;
        min-height: 100vh;
        overflow-x: hidden;
        transition: filter 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .top-left-menu {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
        z-index: 10;
        opacity: 0;
        animation: fadeIn 0.8s ease-in 0.8s forwards;
        text-align: center;
        width: 100%;
    }

    .logo-img {
        height: 100px;
        user-select: none;
        cursor: pointer;
    }

    .menu-links-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 20px;
        font-size: 16px;
    }

    .menu-link {
        cursor: pointer;
        text-decoration: none;
        color: #b9b9b9;
        font-size: 16px;
        margin: 0;
        position: relative;
    }

    .menu-link::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 1px;
        background-color: #b9b9b9;
        transition: width 0.3s ease;
    }

    .menu-link:hover::after {
        width: 100%;
    }

    .divider-small {
        color: #b9b9b9;
        font-size: 16px;
        opacity: 0.8;
        user-select: none;
    }

    body:has(.logo-img:hover) {
        filter: invert(1);
    }

    @media (max-width: 768px) {
        .logo-img {
            height: 90px;
        }
    }
    </style>
</head>
<body>
    <div class="top-left-menu">
        <img src="interiorlogo.jpg" class="logo-img" alt="INTERIØR">
        <div class="menu-links-row">
            <a href="about.html" class="menu-link">ABOUT</a>
            <span class="divider-small">I</span>
            <a href="releases.html" class="menu-link">RELEASES</a>
            <span class="divider-small">I</span>
            <a href="/cdn-cgi/l/email-protection#60090e140512090f120c0102050c2010120f140f0e4e0d05" class="menu-link">CONTACT</a>
        </div>
    </div>
</body>
</html>
