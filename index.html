<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERIØR</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <style>
    @font-face {
        font-family: 'DGMSaffron-Mono-Regular';
        src: url('FONTS/DGMSaffron-Mono-Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    body {
        background: #000;
        color: #6a6a6a;
        font-family: 'DGMSaffron-Mono-Regular', 'Courier New', monospace;
        min-height: 100vh;
        padding: 60px 60px 80px;
        opacity: 0;
        animation: fadeIn 0.8s ease-in forwards;
        font-size: 16px;
        line-height: 1.2;
    }
    .header {
        margin-bottom: 24px;
    }
    .brand {
        font-size: 20px;
        letter-spacing: 0.08em;
        color: #b9b9b9;
    }
    .brand a {
        color: inherit;
        text-decoration: none;
    }
    .about {
        font-size: 13px;
        color: #7a7a7a;
        line-height: 1.7;
        max-width: 56ch;
        margin-bottom: 32px;
    }
    .about p { margin: 0; }

    .socials {
        display: flex;
        gap: 28px;
        margin-top: 40px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }
    .socials a {
        color: #6a6a6a;
        text-decoration: underline;
        text-underline-offset: 3px;
    }
    .socials a:hover { color: #ffffff; }
    .grid {
        display: grid;
        grid-template-columns: repeat(20, 1.4em);
        grid-auto-rows: 1.5em;
        font-family: 'DGMSaffron-Mono-Regular', 'Courier New', monospace;
        font-size: 17px;
        color: #4e4e4e;
        user-select: none;
    }
    .grid > span, .word span {
        text-align: center;
        line-height: 1.5em;
        transition: background 0.05s linear, color 0.05s linear;
    }
    .word {
        display: contents;
        text-decoration: none;
        color: inherit;
    }
    .word span {
        color: #b9b9b9;
        font-weight: bold;
        cursor: pointer;
    }
    .word:hover span,
    .word:focus-visible span {
        background: #ffffff;
        color: #000000;
        outline: none;
    }
    @media (max-width: 720px) {
        body { padding: 24px; font-size: 14px; }
        .grid {
            font-size: min(14px, calc((100vw - 48px) / 26));
            grid-template-columns: repeat(20, 1.3em);
        }
    }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">INTERI<a href="moodboard.html">Ø</a>R</div>
    </div>
    <div class="about">
        <p>Record label focused on foward-thinking electronic music</p>
        <p>Founded in 2025 by Protocol</p>
    </div>

    <div class="grid" id="grid"></div>

    <div class="socials">
        <a href="https://interiorr.bandcamp.com/" target="_blank">bandcamp</a>
        <a href="https://www.instagram.com/protocol.intr" target="_blank">instagram</a>
    </div>

    <script>
    (() => {
        const COLS = 20;
        const ROWS = 16;
        const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789·:·····     ';

        const words = [
            { text: 'RELEASES', href: 'releases.html',                  col: 3,  row: 1, vertical: true },
            { text: 'MIXTAPES', href: 'https://soundcloud.com/interiorlabel',                  col: 13, row: 2, vertical: true },
            { text: 'READ',     href: 'read.html',                      col: 17, row: 5, vertical: true },
            { text: 'CONTACT',  href: 'mailto:interiorlabel@proton.me', col: 8,  row: 9, vertical: true },
        ];

        const grid = Array.from({length: ROWS}, () =>
            Array.from({length: COLS}, () => ({
                char: CHARS[Math.floor(Math.random()*CHARS.length)],
                word: null
            }))
        );

        const occupied = new Set();
        words.forEach((w, wi) => {
            for (let i = 0; i < w.text.length; i++) {
                const r = w.vertical ? w.row + i : w.row;
                const c = w.vertical ? w.col : w.col + i;
                if (r < ROWS && c < COLS) {
                    occupied.add(`${r},${c}`);
                    grid[r][c].word = wi;
                    grid[r][c].char = w.text[i];
                }
            }
        });

        const gridEl = document.getElementById('grid');

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (!occupied.has(`${r},${c}`)) {
                    const s = document.createElement('span');
                    s.textContent = grid[r][c].char;
                    s.style.gridColumn = c + 1;
                    s.style.gridRow = r + 1;
                    gridEl.appendChild(s);
                }
            }
        }

        words.forEach((w) => {
            const a = document.createElement('a');
            a.className = 'word';
            a.href = w.href;
            a.setAttribute('aria-label', w.text);
            for (let i = 0; i < w.text.length; i++) {
                const r = w.vertical ? w.row + i : w.row;
                const c = w.vertical ? w.col : w.col + i;
                const s = document.createElement('span');
                s.textContent = w.text[i];
                s.style.gridColumn = c + 1;
                s.style.gridRow = r + 1;
                a.appendChild(s);
            }
            gridEl.appendChild(a);
        });
    })();
    </script>
</body>
</html>
