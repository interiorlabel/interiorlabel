<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodboard</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
    }

    /* BACK ARROW */
    .back-arrow {
      position: fixed;
      top: 30px;
      left: 20px;
      font-size: 22px;
      color: grey;
      cursor: pointer;
      text-decoration: none;
      z-index: 100;
    }

    .back-arrow:hover {
      color: #ffffff;
    }

    #image-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 90vw;
      max-height: 80vh;
    }

    /* ORIGINAL IMAGE SIZE (no forced square) */
    #moodboard-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      opacity: 0;
      transition: opacity 0.25s ease; /* faster fade */
      filter: grayscale(10%);
      user-select: none;
      -webkit-user-drag: none;
    }

    #moodboard-img.visible {
      opacity: 1;
    }

    #label {
      margin-top: 28px;
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #555;
      text-transform: uppercase;
      user-select: none;
      transition: color 0.3s ease;
    }

    body:hover #label {
      color: #888;
    }
  </style>
</head>

<body>

  <!-- BACK BUTTON -->
  <a href="index.html" class="back-arrow">←</a>

  <div id="image-wrapper">
    <img id="moodboard-img" src="" alt="moodboard" />
  </div>

  <div id="label">click</div>

  <script>
    const images = [
      "moodboard/AlfredStieglitz.png",
      "moodboard/Actionism.jpg",
      "moodboard/AlexeyYurenev.jpg",
      "moodboard/BillBrandt.webp",
      "moodboard/Coum.jpg",
      "moodboard/Deleuze.png",
      "moodboard/ElianeRadigue.jpg",
      "moodboard/FrancisBacon.png",
      "moodboard/Gallery291.png",
      "moodboard/GeorgTrakl.png",
      "moodboard/HeddaSterne,.webp",
      "moodboard/IannisXenakis.jpg",
      "moodboard/LinaBoBardiDrawings.jpg",
      "moodboard/MadameSata.jpg",
      "moodboard/MayaDeren.jpg",
      "moodboard/Messiaen.jpg",
      "moodboard/Mika Vainio.jpg",
      "moodboard/MohammedSalemy.jpg",
      "moodboard/Morton.jpg",
      "moodboard/Numogram.png",
      "moodboard/Pasolini.jpg",
      "moodboard/PeterBrotzmann.jpg",
      "moodboard/PierreSchaeffer.jpg",
      "moodboard/Sadieplant.png",
      "moodboard/SilenceJohnCage.png",
      "moodboard/Tiqqun.png"
    ];

    const img = document.getElementById('moodboard-img');
    let currentIndex = 0;
    let remaining = [];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function refillPool() {
      remaining = shuffle(images.slice(1));
    }

    function nextImage() {
      if (currentIndex === 0) {
        if (remaining.length === 0) refillPool();
        const next = remaining.pop();
        switchTo(next);
        currentIndex = 1;
      } else {
        if (remaining.length === 0) refillPool();
        const next = remaining.pop();
        switchTo(next);
      }
    }

    function switchTo(src) {
      img.classList.remove('visible');

      setTimeout(() => {
        img.src = src;
        img.onload = () => img.classList.add('visible');
        img.onerror = () => img.classList.add('visible');
      }, 120); // faster switch
    }

    // initial image
    img.src = images[0];
    img.onload = () => img.classList.add('visible');

    document.body.addEventListener('click', nextImage);
  </script>

</body>
</html>
