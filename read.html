<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INTERIØR — Read</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <style>
    @font-face {
      font-family: 'DGMSaffron-Mono-Regular';
      src: url('FONTS/DGMSaffron-Mono-Regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: 'DGMSaffron-Mono-Regular', sans-serif;
      opacity: 0;
      animation: fadeIn 0.6s ease-in forwards;
    }

    .back-arrow {
      position: fixed;
      top: 28px;
      left: 28px;
      font-family: Arial, sans-serif;
      font-size: 18px;
      color: #6a6a6a;
      cursor: pointer;
      text-decoration: none;
      z-index: 100;
    }
    .back-arrow:hover {
      color: #ffffff;
    }

    #read-wrap {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #lbl-read {
      font-family: 'DGMSaffron-Mono-Regular', sans-serif;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      user-select: none;
      white-space: nowrap;
      cursor: default;
    }

    #read-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
    }

    .read-item {
      font-family: 'DGMSaffron-Mono-Regular', sans-serif;
      font-size: 15px;
      letter-spacing: 0;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
      transition: color 0.15s ease, text-decoration-color 0.15s ease;
    }

    .read-item:hover {
      color: var(--white);
      text-decoration-color: var(--white);
    }
  </style>
</head>
<body>

<a href="index.html" class="back-arrow">&#8592;</a>

<div id="read-wrap">
  <div id="lbl-read">READ</div>
  <div id="read-list">
    <a class="read-item" href="newsletter.html">newsletter</a>
    <a class="read-item" href="essays.html">essays</a>
  </div>
</div>

</body>
</html>
