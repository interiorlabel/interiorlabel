<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOUND</title>
  <style>
    @font-face {
      font-family: 'ES Allianz TRIAL';
      src: url('ESAllianzTRIAL-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: 'ES Allianz TRIAL', sans-serif;
    }

    /* ── GLITCH OVERLAY ── */
    #glitch-screen {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 100;
    }

    #glitch-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 2px,
        rgba(255,255,255,0.03) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    #glitch-bg {
      position: absolute;
      inset: 0;
      background: var(--black);
    }

    #glitch-bars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 3;
    }

    .bar {
      position: absolute;
      left: 0; right: 0;
      background: var(--white);
    }

    /* ── MAIN CONTENT ── */
    #scene {
      position: fixed;
      inset: 0;
      background: var(--black);
      opacity: 0;
      pointer-events: none;
    }

    /* ── LABELS — plain, no effects ── */
    .label {
      position: absolute;
      font-family: 'ES Allianz TRIAL', sans-serif;
      color: var(--white);
      opacity: 0;
      user-select: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      letter-spacing: 0;
    }

    /* RELEASES */
    #lbl-releases {
      font-size: 15px;
      display: block;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
      transition: color 0.2s ease, text-decoration-color 0.2s ease;
    }

    #lbl-releases:hover {
      color: var(--white);
      text-decoration-color: var(--white);
    }

    /* MIXTAPES */
    #lbl-mixtapes {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      cursor: default;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
      transition: color 0.2s ease, text-decoration-color 0.2s ease;
    }

    #lbl-mixtapes:hover {
      color: var(--white);
      text-decoration-color: var(--white);
    }
  </style>
</head>
<body>

<div id="glitch-screen">
  <div id="glitch-bg"></div>
  <div id="glitch-bars"></div>
</div>

<div id="scene">
  <a href="releases.html" class="label" id="lbl-releases">RELEASES</a>
  <div class="label" id="lbl-mixtapes">MIXTAPES</div>
</div>

<script>
  const glitchScreen = document.getElementById('glitch-screen');
  const bg           = document.getElementById('glitch-bg');
  const barsEl       = document.getElementById('glitch-bars');
  const scene        = document.getElementById('scene');
  const releases     = document.getElementById('lbl-releases');
  const mixtapes     = document.getElementById('lbl-mixtapes');

  const rand  = (a, b) => Math.random() * (b - a) + a;
  const randI = (a, b) => Math.floor(rand(a, b));
  const wait  = ms => new Promise(r => setTimeout(r, ms));

  function flashBg(color, duration) {
    bg.style.background = color;
    return wait(duration).then(() => { bg.style.background = '#000'; });
  }

  function spawnBars(count) {
    barsEl.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      const h = rand(2, 35);
      const t = rand(0, 100 - h);
      bar.style.cssText = `top:${t}%;height:${h}%;opacity:${rand(0.4,1)};`;
      barsEl.appendChild(bar);
      setTimeout(() => bar.remove(), rand(30, 120));
    }
  }

  function placeLabels() {
    // Force them into opposite quadrants so they're well separated
    const quadrants = [
      { xMin: 10, xMax: 42, yMin: 10, yMax: 45 },
      { xMin: 55, xMax: 88, yMin: 52, yMax: 88 },
    ];
    // randomly swap quadrants
    if (Math.random() > 0.5) quadrants.reverse();

    const pick = (q) => ({
      x: rand(q.xMin, q.xMax),
      y: rand(q.yMin, q.yMax)
    });

    const p1 = pick(quadrants[0]);
    const p2 = pick(quadrants[1]);

    releases.style.left = p1.x + '%';
    releases.style.top  = p1.y + '%';
    mixtapes.style.left = p2.x + '%';
    mixtapes.style.top  = p2.y + '%';
  }

  async function runGlitch() {
    // phase 1: rapid flashes — reduced to 7 iterations
    for (let i = 0; i < 7; i++) {
      await flashBg(i % 2 === 0 ? '#fff' : '#000', randI(30, 100));
      spawnBars(randI(2, 6));
      await wait(randI(15, 50));
    }

    // phase 2: short chaos burst — reduced to 8 iterations
    for (let i = 0; i < 8; i++) {
      bg.style.background = Math.random() > 0.5 ? '#fff' : '#000';
      spawnBars(randI(3, 8));
      await wait(randI(20, 60));
    }

    // phase 3: one last snap to black
    bg.style.background = '#fff';
    await wait(50);
    bg.style.background = '#000';
    await wait(80);

    placeLabels();

    glitchScreen.style.transition = 'opacity 0.3s ease';
    scene.style.transition        = 'opacity 0.3s ease';
    scene.style.pointerEvents     = 'auto';
    glitchScreen.style.opacity    = '0';
    scene.style.opacity           = '1';

    await wait(250);

    releases.style.transition = 'opacity 0.25s ease';
    releases.style.opacity    = '1';

    await wait(180);

    mixtapes.style.transition = 'opacity 0.25s ease';
    mixtapes.style.opacity    = '1';

    await wait(300);
    glitchScreen.remove();
  }

  runGlitch();
</script>
</body>
</html>
