<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOUND</title>
  <style>
    @font-face {
      font-family: 'ES Allianz TRIAL';
      src: url('ESAllianzTRIAL-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: 'ES Allianz TRIAL', sans-serif;
    }

    .back-arrow {
      position: fixed;
      top: 28px;
      left: 28px;
      font-size: 18px;
      color: #6a6a6a;
      cursor: pointer;
      text-decoration: none;
      z-index: 100;
    }
    .back-arrow:hover {
      color: #ffffff;
    }
    #glitch-screen {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 100;
    }

    #glitch-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 2px,
        rgba(255,255,255,0.03) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    #glitch-bg {
      position: absolute;
      inset: 0;
      background: var(--black);
    }

    #glitch-bars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 3;
    }

    .bar {
      position: absolute;
      left: 0; right: 0;
      background: var(--white);
    }

    /* ── MAIN CONTENT ── */
    #scene {
      position: fixed;
      inset: 0;
      background: var(--black);
      opacity: 0;
      pointer-events: none;
    }

    /* ── MIXTAPES — top left ── */
    #lbl-mixtapes {
      position: fixed;
      top: 28px;
      right: 28px;
      font-family: 'ES Allianz TRIAL', sans-serif;
      font-size: 12px;
      letter-spacing: 0;
      color: rgba(255,255,255,0.5);
      opacity: 0;
      user-select: none;
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
      text-underline-offset: 3px;
      transition: color 0.2s ease;
      border-bottom: 1px solid #3a3a3a
    }

    #lbl-mixtapes:hover {
      color: var(--white);
      text-decoration-color: var(--white);
    }

    /* ── RELEASES — centered, slightly above middle ── */
    #releases-wrap {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #lbl-releases {
      font-family: 'Baskerville', 'Baskerville Old Face', 'Libre Baskerville', Georgia, serif;
      font-size: 20px;
      letter-spacing: 0;
      color: rgba(255,255,255,0.5);
      user-select: none;
      white-space: nowrap;
      cursor: default;
    }

    /* ── DROPDOWN LIST ── */
    #releases-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
    }

    .artist-item {
      font-family: 'Baskerville', 'Baskerville Old Face', 'Libre Baskerville', Georgia, serif;
      font-size: 15px;
      letter-spacing: 0;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
      transition: color 0.15s ease, text-decoration-color 0.15s ease;
    }

    .artist-item:hover {
      color: var(--white);
      text-decoration-color: var(--white);
    }
  </style>
</head>
<body>

<a href="index.html" class="back-arrow">&#8592;</a>

<div id="glitch-screen">
  <div id="glitch-bg"></div>
  <div id="glitch-bars"></div>
</div>

<div id="scene">

  <!-- MIXTAPES — top left -->
  <a href="mixtapes.html" id="lbl-mixtapes">MIXTAPES</a>

  <!-- RELEASES — centered with dropdown -->
  <div id="releases-wrap">
    <div id="lbl-releases">Releases</div>
    <div id="releases-list">
      <a class="artist-item" href="releases.html">int291</a>
      <span class="artist-item">int292</span>
    </div>
  </div>

</div>

<script>
  const glitchScreen  = document.getElementById('glitch-screen');
  const bg            = document.getElementById('glitch-bg');
  const barsEl        = document.getElementById('glitch-bars');
  const scene         = document.getElementById('scene');
  const releasesWrap  = document.getElementById('releases-wrap');
  const mixtapes      = document.getElementById('lbl-mixtapes');

  const rand  = (a, b) => Math.random() * (b - a) + a;
  const randI = (a, b) => Math.floor(rand(a, b));
  const wait  = ms => new Promise(r => setTimeout(r, ms));

  function flashBg(color, duration) {
    bg.style.background = color;
    return wait(duration).then(() => { bg.style.background = '#000'; });
  }

  function spawnBars(count) {
    barsEl.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      const h = rand(2, 35);
      const t = rand(0, 100 - h);
      bar.style.cssText = `top:${t}%;height:${h}%;opacity:${rand(0.4,1)};`;
      barsEl.appendChild(bar);
      setTimeout(() => bar.remove(), rand(30, 120));
    }
  }

  async function runGlitch() {
    // phase 1: rapid flashes
    for (let i = 0; i < 7; i++) {
      await flashBg(i % 2 === 0 ? '#fff' : '#000', randI(30, 100));
      spawnBars(randI(2, 6));
      await wait(randI(15, 50));
    }

    // phase 2: chaos burst
    for (let i = 0; i < 8; i++) {
      bg.style.background = Math.random() > 0.5 ? '#fff' : '#000';
      spawnBars(randI(3, 8));
      await wait(randI(20, 60));
    }

    // phase 3: snap to black
    bg.style.background = '#fff';
    await wait(50);
    bg.style.background = '#000';
    await wait(80);

    // reveal
    glitchScreen.style.transition = 'opacity 0.3s ease';
    scene.style.transition        = 'opacity 0.3s ease';
    scene.style.pointerEvents     = 'auto';
    glitchScreen.style.opacity    = '0';
    scene.style.opacity           = '1';

    await wait(250);

    releasesWrap.style.transition = 'opacity 0.25s ease';
    releasesWrap.style.opacity    = '1';

    await wait(180);

    mixtapes.style.transition = 'opacity 0.25s ease';
    mixtapes.style.opacity    = '1';

    await wait(300);
    glitchScreen.remove();
  }

  runGlitch();
</script>
</body>
</html>
