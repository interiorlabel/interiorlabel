
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOUND</title>
  <style>
    @font-face {
      font-family: 'ES Allianz TRIAL';
      src: url('ESAllianzTRIAL-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--black);
      font-family: 'ES Allianz TRIAL', sans-serif;
    }

    /* ── GLITCH OVERLAY ── */
    #glitch-screen {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 100;
    }

    /* scanlines */
    #glitch-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 2px,
        rgba(255,255,255,0.03) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    #glitch-bg {
      position: absolute;
      inset: 0;
      background: var(--black);
      transition: background 0s;
    }

    #glitch-bars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 3;
    }

    .bar {
      position: absolute;
      left: 0; right: 0;
      background: var(--white);
      opacity: 0;
    }

    /* ── MAIN CONTENT ── */
    #scene {
      position: fixed;
      inset: 0;
      background: var(--black);
      opacity: 0;
      pointer-events: none;
    }

    /* noise texture overlay */
    #scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      mix-blend-mode: screen;
    }

    /* ── SHARED LABEL BASE ── */
    .label {
      position: absolute;
      font-family: 'ES Allianz TRIAL', sans-serif;
      color: var(--white);
      opacity: 0;
      user-select: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      animation: word-flicker 6s infinite;
    }

    .label::before,
    .label::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
    }
    .label::before {
      color: #ff0000;
      clip-path: inset(10% 0 60% 0);
      animation: glitch-r 4s infinite;
    }
    .label::after {
      color: #00ffff;
      clip-path: inset(60% 0 10% 0);
      animation: glitch-c 4s infinite 0.5s;
    }

    /* ── RELEASES — big & clickable ── */
    #lbl-releases {
      font-size: clamp(72px, 11vw, 175px);
      letter-spacing: 0.06em;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: var(--white);
    }

    #lbl-releases:hover {
      animation: word-flicker 6s infinite, hover-jitter 0.1s infinite;
    }

    /* ── MIXTAPES — smaller, secondary ── */
    #lbl-mixtapes {
      font-size: clamp(28px, 4vw, 64px);
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
    }

    #lbl-mixtapes::before { color: rgba(255,0,0,0.5); }
    #lbl-mixtapes::after  { color: rgba(0,255,255,0.5); }

    /* ── ANIMATIONS ── */
    @keyframes word-flicker {
      0%,94%,96%,100% { opacity: 1; }
      95% { opacity: 0.4; }
    }
    @keyframes glitch-r {
      0%,90%,100% { opacity:0; transform: translate(0); }
      91% { opacity:0.7; transform: translate(-4px, 2px); }
      93% { opacity:0.5; transform: translate(4px, -2px); }
      95% { opacity:0; }
    }
    @keyframes glitch-c {
      0%,85%,100% { opacity:0; transform: translate(0); }
      86% { opacity:0.7; transform: translate(4px, -2px); }
      88% { opacity:0.5; transform: translate(-4px, 2px); }
      90% { opacity:0; }
    }
    @keyframes hover-jitter {
      0%   { transform: translate(-50%,-50%) skewX(0deg); }
      33%  { transform: translate(calc(-50% + 3px),-50%) skewX(-2deg); }
      66%  { transform: translate(calc(-50% - 3px),-50%) skewX(2deg); }
      100% { transform: translate(-50%,-50%) skewX(0deg); }
    }
  </style>
</head>
<body>

<div id="glitch-screen">
  <div id="glitch-bg"></div>
  <div id="glitch-bars"></div>
</div>

<div id="scene">
  <!-- Clicking RELEASES navigates to releases.html -->
  <a href="releases.html" class="label" id="lbl-releases" data-text="RELEASES">RELEASES</a>
  <div class="label" id="lbl-mixtapes" data-text="MIXTAPES">MIXTAPES</div>
</div>

<script>
  const glitchScreen = document.getElementById('glitch-screen');
  const bg           = document.getElementById('glitch-bg');
  const barsEl       = document.getElementById('glitch-bars');
  const scene        = document.getElementById('scene');
  const releases     = document.getElementById('lbl-releases');
  const mixtapes     = document.getElementById('lbl-mixtapes');

  const rand  = (a, b) => Math.random() * (b - a) + a;
  const randI = (a, b) => Math.floor(rand(a, b));
  const wait  = ms => new Promise(r => setTimeout(r, ms));

  function flashBg(color, duration) {
    bg.style.background = color;
    return wait(duration).then(() => { bg.style.background = '#000'; });
  }

  function spawnBars(count) {
    barsEl.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      const h = rand(2, 40);
      const t = rand(0, 100 - h);
      bar.style.cssText = `top:${t}%;height:${h}%;opacity:${rand(0.3,1)};`;
      barsEl.appendChild(bar);
      setTimeout(() => bar.remove(), rand(40, 180));
    }
  }

  function randomPos(padX = 18, padY = 18) {
    return {
      x: rand(padX, 100 - padX),
      y: rand(padY, 100 - padY)
    };
  }

  function placeLabels() {
    let p1, p2;
    do {
      p1 = randomPos(22, 20);
      p2 = randomPos(20, 20);
    } while (Math.abs(p1.x - p2.x) < 30 && Math.abs(p1.y - p2.y) < 24);

    releases.style.left = p1.x + '%';
    releases.style.top  = p1.y + '%';
    mixtapes.style.left = p2.x + '%';
    mixtapes.style.top  = p2.y + '%';
  }

  async function runGlitch() {
    // phase 1: rapid flashes
    for (let i = 0; i < 14; i++) {
      await flashBg(i % 2 === 0 ? '#fff' : '#000', randI(40, 160));
      spawnBars(randI(2, 8));
      await wait(randI(20, 80));
    }

    // phase 2: chaos burst
    for (let i = 0; i < 18; i++) {
      bg.style.background = Math.random() > 0.5 ? '#fff' : '#000';
      spawnBars(randI(4, 12));
      await wait(randI(30, 100));
    }

    // phase 3: final flickers
    await flashBg('#fff', 80);
    await wait(60);
    await flashBg('#fff', 40);
    await wait(80);
    await flashBg('#000', 60);
    await wait(100);

    placeLabels();

    glitchScreen.style.transition = 'opacity 0.4s ease';
    scene.style.transition        = 'opacity 0.4s ease';
    scene.style.pointerEvents     = 'auto';
    glitchScreen.style.opacity    = '0';
    scene.style.opacity           = '1';

    await wait(300);

    // RELEASES pops in first — it's the main act
    releases.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    releases.style.transform  = 'translate(-50%,-50%) scale(1.06)';
    releases.style.opacity    = '1';
    await wait(220);
    releases.style.transform  = 'translate(-50%,-50%) scale(1)';

    // MIXTAPES follows, dimmer
    await wait(220);
    mixtapes.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    mixtapes.style.transform  = 'translate(-50%,-50%) scale(1.06)';
    mixtapes.style.opacity    = '0.5';
    await wait(200);
    mixtapes.style.transform  = 'translate(-50%,-50%) scale(1)';

    await wait(400);
    glitchScreen.remove();
  }

  runGlitch();
</script>
</body>
</html>
